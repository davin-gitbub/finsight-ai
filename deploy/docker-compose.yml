version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: finsight-backend:latest
    container_name: finsight-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - PYTHONUNBUFFERED=1
    volumes:
      - ../backend:/app
      - chroma_data:/app/chroma_db
      - hf_cache:/app/hf_cache
      - feedback_data:/app/feedback
    networks:
      - finsight
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    container_name: finsight-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../widget/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - finsight
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  finsight:
    driver: bridge

volumes:
  chroma_data:
    driver: local
  hf_cache:
    driver: local
  feedback_data:
    driver: local
